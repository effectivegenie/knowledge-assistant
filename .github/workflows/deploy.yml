name: CI / Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-lambdas:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run lambda tests
        run: npm test

  test-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install --frozen-lockfile

      - name: Run frontend tests
        run: cd frontend && npm test

  build-frontend:
    name: Frontend build check
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && npm run build

  synth-cdk:
    name: CDK synth check
    runs-on: ubuntu-latest
    needs: [test-lambdas]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: CDK synth (no deploy)
        run: npm run synth
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build-frontend, synth-cdk]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: CDK bootstrap
        run: npx cdk bootstrap 2>/dev/null || true

      - name: CDK deploy
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Generate frontend config
        run: node scripts/generate-config.js

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(node -e "const o=require('./cdk-outputs.json');console.log(o.KnowledgeAssistantStack.FrontendBucketName)")
          aws s3 sync frontend/dist "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(node -e "const o=require('./cdk-outputs.json');console.log(o.KnowledgeAssistantStack.DistributionId)")
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*" --no-cli-pager
