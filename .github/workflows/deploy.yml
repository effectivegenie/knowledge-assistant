name: Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: CDK bootstrap
        run: npx cdk bootstrap 2>/dev/null || true

      - name: CDK deploy
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Generate frontend config
        run: node scripts/generate-config.js

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(node -e "const o=require('./cdk-outputs.json');console.log(o.KnowledgeAssistantStack.FrontendBucketName)")
          aws s3 sync frontend/dist "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(node -e "const o=require('./cdk-outputs.json');console.log(o.KnowledgeAssistantStack.DistributionId)")
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*" --no-cli-pager
